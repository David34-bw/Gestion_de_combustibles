# ============================================================
#  FuelControl Backend - application.properties
# ============================================================

# Servidor
server.port=8080

# ─── SQLite ─────────────────────────────────────────────────
spring.datasource.url=jdbc:sqlite:fuelcontrol.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# ─── JPA / Hibernate ────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ────────────────────────────────────────────────────
# Cambia este secreto en producción (mínimo 256 bits / 32 chars)
app.jwt.secret=fuelcontrol_super_secret_key_unipiloto_2024!
app.jwt.expiration-ms=86400000

# ─── CORS ───────────────────────────────────────────────────
app.cors.allowed-origins=*

# ─── Logging ────────────────────────────────────────────────
logging.level.co.edu.unipiloto=DEBUG
logging.level.org.springframework.security=INFO
